name: Deploy ARIA to GitHub Pages

on:
  push:
    branches: [claude/voice-ai-life-companion-n5rtj9]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload ARIA app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./aria

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
