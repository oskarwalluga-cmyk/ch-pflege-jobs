<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05060a" />
  <title>ARIA · deine Begleiterin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Atmospheric background layers -->
  <div class="aurora" aria-hidden="true">
    <span class="blob b1"></span>
    <span class="blob b2"></span>
    <span class="blob b3"></span>
    <div class="grain"></div>
    <div class="vignette"></div>
  </div>

  <!-- Onboarding / name veil -->
  <div id="veil" class="veil">
    <div class="veil-card">
      <div class="veil-orb"></div>
      <h1 class="veil-title">Hallo.</h1>
      <p class="veil-sub">Ich bin <em>Aria</em>. Ich werde dich begleiten — leise, aufmerksam, ganz für dich.</p>
      <input id="nameInput" class="veil-input" type="text" placeholder="Wie darf ich dich nennen?" autocomplete="off" />
      <button id="beginBtn" class="veil-btn">Beginnen</button>
      <p class="veil-hint">Sprich mit mir — oder schreib. Ich höre auf beides.</p>
    </div>
  </div>

  <!-- Main stage -->
  <main class="stage" id="stage" hidden>
    <header class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">ARIA</span>
      </div>
      <div class="topbar-actions">
        <button id="ambientBtn" class="chip" title="Klangteppich">~ Ambiente</button>
        <button id="settingsBtn" class="chip" title="Einstellungen">Stimme</button>
      </div>
    </header>

    <!-- The orb -->
    <section class="orb-wrap">
      <div id="orb" class="orb" role="button" tabindex="0" aria-label="Sprechen">
        <canvas id="viz" class="viz"></canvas>
        <div class="orb-core"></div>
        <div class="orb-ring r1"></div>
        <div class="orb-ring r2"></div>
        <div class="orb-ring r3"></div>
      </div>
      <p id="status" class="status">Tippe auf mich, um zu sprechen</p>
    </section>

    <!-- Conversation -->
    <section class="convo" id="convo" aria-live="polite"></section>

    <!-- Quick rituals -->
    <nav class="rituals" id="rituals">
      <button class="ritual" data-ritual="morning">☀ Morgen</button>
      <button class="ritual" data-ritual="breathe">❋ Atmen</button>
      <button class="ritual" data-ritual="mood">♡ Gefühl</button>
      <button class="ritual" data-ritual="journal">✎ Tagebuch</button>
      <button class="ritual" data-ritual="evening">☾ Abend</button>
    </nav>

    <!-- Input dock -->
    <div class="dock">
      <button id="micBtn" class="mic" aria-label="Mikrofon">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6">
          <rect x="9" y="3" width="6" height="11" rx="3"/>
          <path d="M5 11a7 7 0 0 0 14 0M12 18v3"/>
        </svg>
      </button>
      <input id="textInput" class="dock-input" type="text" placeholder="Sag mir, was dich bewegt…" autocomplete="off" />
      <button id="sendBtn" class="send" aria-label="Senden">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M5 12h14M13 6l6 6-6 6"/>
        </svg>
      </button>
    </div>
  </main>

  <!-- Voice settings drawer -->
  <div id="drawer" class="drawer" hidden>
    <div class="drawer-inner">
      <h3>Ihre Stimme</h3>
      <label class="field">
        <span>Stimme</span>
        <select id="voiceSelect"></select>
      </label>
      <label class="field">
        <span>Wärme <small id="pitchVal"></small></span>
        <input id="pitch" type="range" min="0.6" max="1.4" step="0.05" />
      </label>
      <label class="field">
        <span>Tempo <small id="rateVal"></small></span>
        <input id="rate" type="range" min="0.6" max="1.2" step="0.05" />
      </label>
      <label class="field switch-row">
        <span>Antwortet von selbst</span>
        <input id="autoSpeak" type="checkbox" checked />
      </label>
      <button id="testVoice" class="veil-btn small">Hör mich</button>
      <button id="forget" class="link-danger">Alles vergessen</button>
      <button id="closeDrawer" class="drawer-close" aria-label="Schließen">×</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
