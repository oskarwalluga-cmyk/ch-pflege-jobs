<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#1a1330"/>
      <stop offset="100%" stop-color="#05060a"/>
    </radialGradient>
    <radialGradient id="hi" cx="36%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".85"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="orb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e6a6c7"/>
      <stop offset="50%" stop-color="#9b8cff"/>
      <stop offset="100%" stop-color="#6fe0d6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="#9b8cff" stroke-opacity=".18" stroke-width="2"/>
  <circle cx="256" cy="256" r="176" fill="none" stroke="#e6a6c7" stroke-opacity=".12" stroke-width="2"/>
  <circle cx="256" cy="256" r="120" fill="url(#orb)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="120" fill="url(#hi)"/>
</svg>
